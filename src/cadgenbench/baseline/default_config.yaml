# Default AgentConfig values for the cadgenbench baseline.
#
# Single source of truth: cadgenbench.baseline.types loads this file once at
# import time and uses its values as the AgentConfig field defaults. The CLI
# (cadgenbench.baseline._cli) reads the same dataclass for argparse defaults,
# so the dataclass and the CLI can never drift.
#
# Override at the CLI level via flags (--model, --max-iter, ...). A future
# --config <other.yaml> flag will allow loading a different preset.

model: null               # null = let LLMClient resolve (env var, etc.)
temperature: 0.0
max_tokens: 16384         # per-LLM-call completion budget
max_total_tokens: 1000000 # global token budget across all turns
max_iterations: 1000      # agent turn cap; wall-clock timeout is the real guardrail
max_duration_s: 1800.0    # wall-clock timeout (seconds)
runner_timeout: 120       # per-script subprocess timeout (seconds)
llm_timeout: 300.0        # per-LLM-call timeout (seconds)
reasoning_effort: null    # null | minimal | low | medium | high
